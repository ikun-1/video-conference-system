# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/172.21.32.184+2.pem;
    ssl_certificate_key /etc/nginx/certs/172.21.32.184+2-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain application/javascript application/json text/css image/svg+xml;
    gzip_min_length 256;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — 所有非文件请求交给 Vue Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理 (REST + WebSocket)
    location /api/ {
        proxy_pass http://localhost:8080/api/;
        proxy_http_version 1.1;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接超时（支持长时间会议）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 上传文件代理
    location /uploads/ {
        proxy_pass http://localhost:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 上传的图片等静态资源缓存 7 天
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
