# TURN服务器配置（本地开发环境）
listening-port=3478
tls-listening-port=5349

# 本地开发用 127.0.0.1，部署时改为服务器公网IP
external-ip=127.0.0.1
relay-ip=127.0.0.1

realm=localhost
verbose
log-file=/var/log/turnserver.log

# 长期凭证机制
lt-cred-mech

# 测试账号（部署时请修改密码）
user=devuser:devpassword

# 性能限制
max-bps=1000000
bps-capacity=0

# 本地开发禁用中继 TCP，仅用 UDP
no-tcp-relay

no-multicast-peers
no-cli
